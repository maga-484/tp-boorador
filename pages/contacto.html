<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img
          src="../imagen4/logo1.png"
          alt="imagen del logo"
          width="70"
          height="70"
        />
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li>
            <a href="./carrito.html" class="carrito-icono"
              ><img src="../imagen4/72.png" width="30" height="30" />
              <span id="contador-carrito">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Contacto</h1>

      <form
        class="form-contacto"
        action="//formspree.io/f/mnjowaaq"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email"> Your email: </label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="mensaje"> Your message: </label>
          <textarea id="mensaje" name="message"></textarea>
        </div>

        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>

    <footer>
      <p>Sitio realizado por Karen para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li>
            <img src="../imagen4/social.png" alt="logo de whatsapp" />
          </li>
          <li>
            <img src="../imagen4/instagram.png" alt="logo de instagram" />
          </li>
        </ul>
      </nav>
    </footer>
    <script type="module" src="../js/contacto.js"></script>
  </body>
</html>
